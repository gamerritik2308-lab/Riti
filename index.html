<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Happy Birthday Palak ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

overflow:hidden;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

background:
linear-gradient(
-45deg,
#ff5ea5,
#ff8fc6,
#ffc3df,
#ffe0f0
);

background-size:400% 400%;

animation:bg 10s infinite ease;

}

@keyframes bg{

0%{background-position:0 50%;}

50%{background-position:100% 50%;}

100%{background-position:0 50%;}

}

/* Hearts */

.hearts span{

position:fixed;

bottom:-100px;

font-size:28px;

animation:heartFloat linear infinite;

pointer-events:none;

}

@keyframes heartFloat{

from{

transform:
translateY(0)
rotate(0);

}

to{

transform:
translateY(-130vh)
rotate(360deg);

}

}

/* Floating Photos */

.floatingPics img{

position:fixed;

bottom:-180px;

width:22vw;

height:22vw;

max-width:150px;

max-height:150px;

min-width:90px;

min-height:90px;

border-radius:20px;

object-fit:cover;

border:4px solid white;

box-shadow:
0 0 20px rgba(255,255,255,.8);

pointer-events:none;

}

/* Card */

.card{

width:100%;

max-width:420px;

padding:28px;

border-radius:30px;

text-align:center;

background:
rgba(255,255,255,.18);

backdrop-filter:blur(15px);

box-shadow:
0 15px 40px rgba(0,0,0,.2);

z-index:10;

}

.photo{

width:170px;

height:170px;

margin:auto;

border-radius:50%;

overflow:hidden;

border:6px solid white;

box-shadow:
0 0 30px hotpink;

animation:pulse 2s infinite;

}

@keyframes pulse{

50%{

transform:scale(1.05);

}

}

.photo img{

width:100%;

height:100%;

object-fit:cover;

}

h1{

margin-top:20px;

color:rgb(41, 34, 34);

font-size:38px;

}

.typing{

margin-top:15px;

color:rgb(250, 249, 249);

font-size:18px;

min-height:70px;

line-height:1.6;

}

button{

margin-top:20px;

padding:14px 28px;

border:none;

border-radius:40px;

cursor:pointer;

font-size:18px;

font-weight:bold;

background:white;

color:#ff2f7a;

}

.popup{

position:fixed;

inset:0;

display:none;

justify-content:center;

align-items:center;

background:
rgba(0,0,0,.5);

z-index:99;

}

.popup-box{

background:white;

padding:30px;

border-radius:20px;

font-size:28px;

text-align:center;

}

@media(max-width:600px){

.photo{

width:140px;

height:140px;

}

h1{

font-size:30px;

}

}

</style>

</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="floatingPics" id="floatingPics"></div>

<div class="card">

<div class="photo">

<img src="pic1.jpg">

</div>

<h1>Happy Birthday to u🌸Palak🌸</h1>

<div class="typing" id="typing"></div>

<button onclick="surprise()">

Open Surprise ✨

</button>

</div>

<div class="popup" id="popup">

<div class="popup-box">

✨❤️Happy Birthday❤️✨🌸Palak  🌸 

</div>

</div>

<script>

/* Typing */

const text=

"Palak, wishing you happiness, smiles and beautiful memories forever ✨❤️";

let i=0;

function type(){

if(i<text.length){

typing.innerHTML+=text[i];

i++;

setTimeout(type,35);

}

}

type();

/* Hearts */

for(let i=0;i<25;i++){

let h=
document.createElement(
"span"
);

h.innerHTML=

["❤️","💕","💖","💗"][Math.floor(Math.random()*4)];

h.style.left=
Math.random()*100+"%";

h.style.animationDuration=
(5+Math.random()*7)+"s";

document
.getElementById(
"hearts"
)
.appendChild(h);

}

/* Floating Photos */

const photos=[

"pic2.jpg",

"pic3.jpg",

"pic4.jpg",

"pic5.jpg",

"pic6.jpg"

];

photos.forEach(photo=>{

let img=
document.createElement(
"img"
);

img.src=photo;

img.style.left=
Math.random()*90+"%";

document
.getElementById(
"floatingPics"
)
.appendChild(img);

img.animate(

[

{

transform:
"translateY(0) rotate(0deg)"

},

{

transform:
`translate(${(Math.random()*220)-110}px,-140vh) rotate(360deg)`

}

],

{

duration:
9000+Math.random()*8000,

iterations:
Infinity,

delay:
Math.random()*4000

}

);

});

/* Popup */

function surprise(){

popup.style.display="flex";

setTimeout(()=>{

popup.style.display="none";

},3000);

}

</script>

</body>

</html>
